<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyBourse</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: sans-serif;
        background: #f4f4f4;
        padding: 24px;
        color: #222;
      }

      h1 {
        margin-bottom: 20px;
        font-size: 1.6rem;
      }

      #app {
        max-width: 900px;
        margin: 0 auto;
      }

      #controls {
        display: flex;
        gap: 16px;
        align-items: flex-end;
        flex-wrap: wrap;
        margin-bottom: 24px;
        background: #fff;
        padding: 16px;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
      }

      .champ {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      label {
        font-size: 0.85rem;
        font-weight: bold;
        color: #555;
      }

      select {
        padding: 8px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 0.95rem;
        background: #fff;
        cursor: pointer;
      }

      select:focus {
        outline: none;
        border-color: #4a90e2;
      }

      button {
        padding: 8px 20px;
        background: #4a90e2;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 0.95rem;
        cursor: pointer;
        align-self: flex-end;
      }

      button:hover {
        background: #357abd;
      }

      #loader {
        text-align: center;
        padding: 12px;
        color: #666;
        font-style: italic;
      }

      #zone-erreur {
        background: #ffe0e0;
        border: 1px solid #e74c3c;
        border-radius: 4px;
        padding: 12px 16px;
        color: #c0392b;
        margin-bottom: 16px;
      }

      #chart-container {
        background: #fff;
        border-radius: 8px;
        padding: 24px;
        min-height: 300px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
        /* P2 dessinera le graphique ici */
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>MyBourse</h1>
      <div id="chart-container"></div>
    </div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
